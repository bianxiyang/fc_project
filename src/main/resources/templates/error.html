<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - 2025新球场公会</title>
    <!-- 引入Bootstrap CSS -->
    <!-- 使用本地Bootstrap CSS -->
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- 响应式样式 -->
    <link href="/css/responsive.css" rel="stylesheet">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }
        .error-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        .error-code {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #dc3545;
        }
        .error-message {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #495057;
        }
        .error-description {
            color: #6c757d;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-back {
            background-color: #0d6efd;
            color: white;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }
        .btn-back:hover {
            background-color: #0a58ca;
            color: white;
        }
        .exception-details {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            color: #6c757d;
            text-align: left;
            word-break: break-all;
        }
        @media (max-width: 768px) {
            .error-container {
                margin: 1rem;
                padding: 1.5rem;
            }
            .error-code {
                font-size: 2.5rem;
            }
            .error-message {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <!-- 错误图标 -->
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle text-warning"></i>
            </div>
            
            <!-- 错误代码 -->
            <div class="error-code">[[${errorCode} ?: '404']]</div>
            
            <!-- 错误消息 -->
            <div class="error-message">[[${errorMessage} ?: '页面不存在']]</div>
            
            <!-- 错误描述 -->
            <div class="error-description">[[${errorDescription} ?: '抱歉，您访问的页面不存在或已被移除']]</div>
            
            <!-- 异常详情（如果有） -->
            <div th:if="${exceptionMessage}" class="exception-details">
                <strong>详细信息：</strong>
                <p>[[${exceptionMessage}]]</p>
            </div>
            
            <!-- 返回首页按钮（管理员和超级管理员可见） -->
            <a href="/rank-table" class="btn-back" sec:authorize="hasRole('ADMIN') or hasRole('ROOT')">返回首页</a>
        </div>
    </div>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- 响应式样式 -->
    <link href="/css/responsive.css" rel="stylesheet">
</body>
</html>
